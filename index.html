<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devin Level Up Workshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #000000;
            --cyan: #00f2ea;
            --pink: #ff0050;
            --bg: #f4f4f5;
            --card: #ffffff;
            --muted: #6b7280;
            --line: #e6e6e8;
            --ink-soft: #1f1f23;
            --font: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            --mono: "SF Mono", "Fira Code", ui-monospace, Menlo, monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }
        body { min-height: 100vh; background: var(--bg); color: var(--ink); padding: 36px 16px 72px; -webkit-font-smoothing: antialiased; }
        .container { max-width: 880px; margin: 0 auto; }

        /* Header */
        .header { text-align: center; margin-bottom: 8px; }
        .logo { font-size: 2.6rem; font-weight: 800; letter-spacing: -1.2px; line-height: 1; }
        .logo .w1 { color: var(--ink); }
        .logo .w2 { color: #00ccc5; }
        .logo .w3 { color: var(--pink); }
        .eyebrow-top { display: inline-block; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
            color: var(--ink); background: var(--cyan); padding: 4px 12px; border-radius: 99px; margin-bottom: 14px; }
        .subtitle { color: var(--muted); font-size: 0.96rem; line-height: 1.6; max-width: 600px; margin: 14px auto 0; }

        /* Progress */
        .progress-wrap { margin: 28px 0 22px; }
        .progress-label { font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 7px; display: flex; justify-content: space-between; }
        .progress-bar { height: 8px; background: #e2e2e6; border-radius: 99px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; border-radius: 99px; background: linear-gradient(90deg, var(--cyan), var(--pink)); transition: width 0.4s ease; }

        /* Stepper */
        .stepper { display: flex; align-items: center; justify-content: center; margin-bottom: 26px; flex-wrap: wrap; }
        .step { display: flex; align-items: center; }
        .step-dot { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 800; background: var(--card); border: 2px solid var(--line); color: #9aa0a6; cursor: pointer;
            transition: all 0.18s ease; flex-shrink: 0; }
        .step-dot:hover { border-color: var(--ink); color: var(--ink); }
        .step-dot.current { border-color: var(--cyan); color: var(--ink); box-shadow: 0 0 0 4px rgba(0,242,234,0.25); }
        .step-dot.done { background: var(--cyan); border-color: var(--cyan); color: var(--ink); }
        .step-line { width: 28px; height: 2px; background: var(--line); flex-shrink: 0; }
        .step-line.done { background: var(--cyan); }

        /* Stage card */
        .stage { background: var(--card); border: 1px solid var(--line); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        .stage-head { padding: 26px 30px 0; }
        .stage-eyebrow { font-size: 0.74rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--pink); }
        .stage-title { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.6px; margin: 6px 0 8px; }
        .stage-meta { display: inline-block; font-size: 0.74rem; font-weight: 700; color: var(--ink); background: rgba(0,242,234,0.18);
            padding: 4px 11px; border-radius: 99px; }

        .body { padding: 22px 30px 28px; }

        /* Narrative */
        .narrative { border-left: 4px solid var(--cyan); background: #fafafa; padding: 16px 18px; border-radius: 0 12px 12px 0;
            font-size: 0.94rem; line-height: 1.7; color: var(--ink-soft); margin-bottom: 22px; }
        .narrative p + p { margin-top: 10px; }
        .narrative .label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--pink); margin-bottom: 8px; }
        .narrative em { color: var(--ink); font-style: italic; }

        .goal { font-size: 0.98rem; line-height: 1.7; color: var(--ink); margin-bottom: 20px; }
        .section + .section { margin-top: 30px; padding-top: 30px; border-top: 1px solid var(--line); }
        .sec-head { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 14px; }
        .sec-head::before { content: ""; display: inline-block; width: 8px; height: 8px; border-radius: 2px; background: var(--cyan); margin-right: 10px; vertical-align: middle; }
        code { font-family: var(--mono); font-size: 0.85em; background: rgba(0,0,0,0.06); color: var(--ink); padding: 1px 6px; border-radius: 5px; }

        /* Option toggle */
        .opt-toggle { display: inline-flex; background: #f0f0f2; border: 1px solid var(--line); border-radius: 12px; padding: 4px; gap: 4px; margin-bottom: 20px; }
        .opt-btn { padding: 9px 20px; font-size: 0.86rem; font-weight: 700; color: var(--muted); background: none; border: none; border-radius: 9px;
            cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
        .opt-btn .tag { font-size: 0.68rem; font-weight: 800; padding: 1px 7px; border-radius: 99px; background: #d9d9de; color: #555; }
        .opt-btn.active { background: var(--cyan); color: var(--ink); }
        .opt-btn.active .tag { background: #fff; color: var(--ink); }

        .opt-pane { display: none; animation: fade 0.22s ease; }
        .opt-pane.active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

        .opt-title { font-size: 1.04rem; font-weight: 800; margin-bottom: 6px; }
        .opt-title .pill { font-size: 0.66rem; font-weight: 800; padding: 2px 8px; border-radius: 99px; vertical-align: middle; margin-right: 8px; }
        .opt-title.a .pill { background: var(--cyan); color: var(--ink); }
        .opt-title.b .pill { background: var(--pink); color: #fff; }
        .opt-desc { font-size: 0.93rem; line-height: 1.7; color: var(--ink-soft); margin-bottom: 14px; }

        ol.steps, ul.steps { margin: 0 0 16px 1.1rem; }
        ol.steps li, ul.steps li { font-size: 0.92rem; line-height: 1.65; color: var(--ink-soft); margin-bottom: 6px; }

        /* Prompt */
        .prompt-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
        .prompt-wrap { position: relative; }
        .prompt { background: var(--ink); color: #f4f4f5; border-radius: 12px; padding: 16px 18px; font-size: 0.875rem; line-height: 1.65;
            white-space: pre-wrap; word-break: break-word; font-family: var(--mono); border: 1px solid var(--ink); }
        .prompt .hl { color: var(--cyan); }
        .copy-btn { display: inline-flex; align-items: center; gap: 6px; margin: 10px 0 0 auto; background: var(--cyan); color: var(--ink); border: none;
            border-radius: 8px; padding: 8px 16px; font-size: 0.78rem; font-weight: 800; cursor: pointer; transition: all 0.15s; float: right; }
        .copy-btn:hover { background: #00d4cd; color: var(--ink); }
        .copy-btn.copied { background: #00d4cd; color: var(--ink); }
        .clearfix::after { content: ""; display: block; clear: both; }
        .prompt-opt { margin-top: 16px; }
        .prompt-opt > summary { cursor: pointer; font-size: 0.74rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
            list-style: none; display: inline-flex; align-items: center; gap: 7px; user-select: none; }
        .prompt-opt > summary::-webkit-details-marker { display: none; }
        .prompt-opt > summary::before { content: "\25B8"; color: var(--pink); font-size: 0.95em; }
        .prompt-opt[open] > summary::before { content: "\25BE"; }
        .prompt-opt > summary:hover { color: var(--ink); }
        .prompt-opt .prompt-wrap { margin-top: 10px; }

        /* Extra note (validate / checkpoint) */
        .extra { margin-top: 22px; border-top: 1px dashed var(--line); padding-top: 18px; }
        .extra .row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
        .extra .row:last-child { margin-bottom: 0; }
        .extra .k { flex-shrink: 0; font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em;
            padding: 4px 9px; border-radius: 7px; background: rgba(0,242,234,0.18); color: var(--ink); margin-top: 1px; }
        .extra .row.check .k { background: rgba(255,0,80,0.12); color: var(--pink); }
        .extra .v { font-size: 0.9rem; line-height: 1.6; color: var(--ink-soft); }
        .extra .v em { color: var(--ink); font-style: italic; }

        /* Footer of card */
        .stage-foot { border-top: 1px solid var(--line); padding: 16px 30px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .complete-toggle { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; font-weight: 700; color: var(--ink); cursor: pointer; user-select: none; }
        .complete-toggle input { width: 20px; height: 20px; accent-color: var(--pink); cursor: pointer; }
        .nav-btns { display: flex; gap: 8px; }
        .nav-btn { padding: 10px 20px; font-size: 0.88rem; font-weight: 700; border-radius: 10px; border: 1.5px solid var(--ink);
            background: var(--card); color: var(--ink); cursor: pointer; transition: all 0.15s; }
        .nav-btn:hover:not(:disabled) { background: var(--cyan); border-color: var(--cyan); }
        .nav-btn.primary { background: var(--cyan); border-color: var(--cyan); color: var(--ink); }
        .nav-btn.primary:hover:not(:disabled) { background: #00d4cd; border-color: #00d4cd; color: var(--ink); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .start-wrap { text-align: center; margin-top: 6px; }
        .start-btn { font-size: 0.98rem; padding: 13px 30px; }
        .intro-card .body { padding-top: 26px; }

        .footer { text-align: center; margin-top: 22px; display: flex; gap: 14px; align-items: center; justify-content: center; }
        .reset-btn { background: none; border: 1px solid var(--line); color: var(--muted); padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
        .reset-btn:hover { color: var(--pink); border-color: var(--pink); }
        .docs-link { font-size: 0.8rem; color: var(--muted); text-decoration: none; border-bottom: 1px dotted var(--muted); }
        .docs-link:hover { color: var(--ink); border-color: var(--ink); }

        .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: var(--cyan);
            padding: 11px 22px; border-radius: 10px; font-size: 0.85rem; font-weight: 700; opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease; pointer-events: none; z-index: 100; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 560px) {
            .logo { font-size: 2rem; }
            .step-line { width: 12px; }
            .step-dot { width: 31px; height: 31px; font-size: 0.78rem; }
            .stage-head, .body, .stage-foot { padding-left: 18px; padding-right: 18px; }
            .stage-title { font-size: 1.35rem; }
            .opt-toggle { width: 100%; }
            .opt-btn { flex: 1; justify-content: center; padding: 9px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="eyebrow-top">Devin 201 · Leveling Up</span>
            <div class="logo"><span class="w1">Devin</span> <span class="w2">Level</span> <span class="w3">Up</span></div>
        </div>

        <div class="stage intro-card" id="intro">
            <div class="stage-head">
                <div class="stage-eyebrow">Start here</div>
                <div class="stage-title">Leveling up with Devin</div>
            </div>
            <div class="body" id="intro-body"></div>
        </div>

        <div id="workshop" style="display:none">
            <div class="progress-wrap">
                <div class="progress-label"><span id="progress-text">0 / 3 complete</span><span id="progress-pct">0%</span></div>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            </div>

            <div class="stepper" id="stepper"></div>

            <div class="stage">
                <div class="stage-head">
                    <div class="stage-eyebrow" id="stage-eyebrow"></div>
                    <div class="stage-title" id="stage-title"></div>
                </div>
                <div class="body" id="stage-body"></div>
                <div class="stage-foot">
                    <label class="complete-toggle">
                        <input type="checkbox" id="complete-check">
                        <span>Mark this step done</span>
                    </label>
                    <div class="nav-btns">
                        <button class="nav-btn" id="prev-btn">&larr; Back</button>
                        <button class="nav-btn primary" id="next-btn">Next &rarr;</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="stage gate-card" id="gate" style="display:none">
            <div class="stage-head">
                <div class="stage-eyebrow">Hold here</div>
                <div class="stage-title">Wait here</div>
            </div>
            <div class="body" id="gate-body"></div>
        </div>

        <div class="stage finished-card" id="finished" style="display:none">
            <div class="stage-head">
                <div class="stage-eyebrow">Done</div>
                <div class="stage-title">Nice work</div>
            </div>
            <div class="body" id="finished-body"></div>
        </div>

        <div class="footer">
            <button class="reset-btn" onclick="resetAll()">Reset progress</button>
            <a class="docs-link" href="https://docs.devin.ai" target="_blank" rel="noopener">Devin docs ↗</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    var FRAMING = {
        goal: "<p>We'll work three things, in order, each one making the next one stronger:</p><ol class='steps'><li><strong>Knowledge & Playbooks</strong>: teach Devin your team's conventions and turn a repeat task into a one-click workflow.</li><li><strong>Session Optimization</strong>: find where Devin wasted time and kill the cause.</li><li><strong>Secrets</strong>: give Devin the credentials an integration needs, securely, never pasted into code.</li></ol><p>Most stages have <strong>Option A</strong> (use your own real work) and <strong>Option B</strong> (a general fallback if you don't have the material handy). You build the same artifact either way.</p><p><strong>Before we start:</strong> form groups of 3 or 4, and mix experience levels. If you haven't used Devin much, team up with someone who has.</p>"
    };
    var PHASES = [
        {
            id: 0,
            eyebrow: "Phase 1",
            title: "Knowledge & Playbooks",
            sections: [
                {
                    heading: "Gather Knowledge",
                    narrative: "<span class='label'>Picture this</span><p>You ask Devin to add an API endpoint. It works, but it names the file <code>userController.js</code> when everything else is kebab-case, returns a raw object instead of your standard <code>{ data, error }</code> envelope, and skips the Zod schema your team requires. Nothing is <em>broken</em>, so review catches it and bounces it back. You just burned a cycle on style.</p><p>Now imagine Devin already knew those three rules. It writes it right the first time. <em>That's a knowledge note</em>: it encodes a convention once so you never re-explain it. The highest-value notes describe the things Devin currently gets <strong>wrong</strong> in your environment.</p>",
            goal: "<strong>Goal:</strong> capture a collection of one repo's conventions as a single knowledge note <strong>pinned to that repo</strong>, so Devin retrieves it automatically.",
            options: {
                a: {
                    title: "Create Knowledge for Devin",
                    desc: "For the repo you know best, write a single knowledge note that collects its conventions, the ones Devin keeps getting wrong, and pin it to that repo. The optional prompt below just has Devin interview you to round them up if you want a hand.",
                    steps: ["Pick the repo you know best and list its conventions: naming, structure, error handling, API shape, CI, anything Devin gets wrong.", "Go to <strong>Settings \u2192 Knowledge \u2192 Create Knowledge</strong> and write them up as one clear note.", "<strong>Pin it to the repo</strong> so Devin retrieves it automatically on that repo."],
                    promptOptional: true,
                    prompt: "Interview me to collect the conventions for [repo] that I want Devin to follow. Ask one question at a time about its naming, structure, error handling, API shape, and CI, then draft a single knowledge note gathering them all for me to pin to the repo."
                },
                b: {
                    title: "Mine the conventions from a repo",
                    desc: "No conventions written down? Let Devin infer them straight from the code, then pin the collected set as one note on the repo.",
                    steps: ["Choose your cleanest, most representative repo.", "Run the prompt below to gather its conventions.", "In <strong>Settings \u2192 Knowledge \u2192 Create Knowledge</strong>, write them up as one note and <strong>pin it to the repo</strong>."],
                    prompt: "Analyze [repo] and infer its conventions: naming, structure, error handling, API response shape, and imports. Give me a single knowledge note that collects them, grounded in real file paths, and flag anything you inferred rather than read."
                }
            },
            extra: [
                { k: "Validate", v: "Start a fresh session on that repo with a prompt that <em>should</em> use the note (e.g. \u201cadd an endpoint\u201d) and confirm Devin applies the conventions automatically. If it doesn't, recheck that the note is pinned to the repo." }
            ]
                },
                {
                    heading: "Build a Playbook",
                    narrative: "<span class='label'>Picture this</span><p>Every bug follows the same dance: reproduce it, write a failing test, hunt the root cause, patch it, confirm the test goes green, open the PR. You re-type the same long prompt from memory each time, and half the time you skip the failing-test-first step.</p><p>Freeze that workflow once as a <em>playbook</em>. Next bug, anyone attaches it, drops in the ticket, and Devin runs the exact same steps every time, including the one you keep skipping. Knowledge taught Devin <em>how your code should look</em>; a playbook teaches it <em>how to run a recurring job</em>.</p>",
            goal: "<strong>Goal:</strong> turn one repetitive task into a reusable, parameterized <strong>playbook</strong> you attach to a session.",
            options: {
                a: {
                    title: "Automate a task you repeat",
                    desc: "Think about what <em>you</em> do over and over: fixing a bug, adding an endpoint, cutting a release, scaffolding a component. Pick one and turn it into a parameterized playbook. The optional prompt is just a fallback for when you're stuck on scoping it.",
                    steps: ["Name a task you do day to day and the exact steps you take.", "Write it as a playbook: overview, inputs (e.g. <code>&lt;ticket_id&gt;</code>), ordered steps, and a verification step.", "Save it under <strong>Playbooks \u2192 New</strong>."],
                    promptOptional: true,
                    prompt: "I want to turn a task I repeat into a playbook but I'm not sure how to scope it. Ask me questions about what I do over and over and the exact steps I take, then draft a parameterized playbook (overview, inputs, ordered steps, and a verification step) for me to review."
                },
                b: {
                    title: "Security vulnerability sweep",
                    desc: "No recurring task in mind? Build one every team needs and can run against <em>any</em> repo: a <strong>dependency security audit</strong>. Repetitive (run it every sprint), parameterizable (point it at any repo), verifiable (clean or patched).",
                    steps: ["Run the prompt below to draft the playbook.", "Save it under <strong>Playbooks \u2192 New</strong>.", "Note that it now works against every repo you own, which is the whole point of a playbook over a one-off prompt."],
                    prompt: "Draft a reusable \u201cSecurity vulnerability sweep\u201d playbook with input <repo>: detect the package manager and run its audit, patch only vulnerable deps to their nearest safe version, run the build and tests, then open a PR with a before/after vulnerability count."
                }
            },
            extra: [
                { k: "Validate", v: "Start a fresh session, <strong>attach the playbook</strong> (confirm the blue pill appears), and run it on a real instance. Make sure Devin followed the steps and hit your verification bar, and tighten any step it skipped." }
            ]
                }
            ]
        },
        {
            id: 1,
            eyebrow: "Phase 2",
            title: "Optimize a Session",
            sections: [
                {
                    narrative: "<span class='label'>Picture this</span><p>You open a session that wasted a ton of time and tokens. The timeline shows Devin spent the first third grepping through 30 files looking for how pagination works, a pattern that already lived in <code>lib/paginate.ts</code>. It eventually found it, but the time and tokens were already spent.</p><p>Root cause: <em>unnecessary investigation</em>. The fix isn't \u201cprompt better next time\u201d; it's a one-line knowledge note (\u201cpagination lives in <code>lib/paginate.ts</code>, offset-based\u201d) that kills this entire class of waste for <em>every</em> future session. Diagnosis turns one expensive session into a permanent fix.</p>",
            goal: "<strong>Goal:</strong> find a session that was slow, expensive, or never merged; name <em>why</em>; and apply one fix so that whole category of waste stops.",
            options: {
                a: {
                    title: "Diagnose a real session",
                    desc: "No API or special access needed. Just scroll back through your own session history in the web app and find a bad one.",
                    steps: ["Hunt for the tells: a long thread with lots of back-and-forth, an unusually high token count, a session that ran forever, or a PR opened but never merged.", "Open it and click <strong>Generate session insights</strong> to get a breakdown of where the time and ACUs actually went.", "Classify it into <strong>exactly one</strong> root cause, then apply the matching fix."],
                    table: [
                        ["Unnecessary investigation", "Searched many files before finding an existing pattern", "Knowledge note / skill naming the file"],
                        ["Wrong approach", "Chose a strategy that conflicted and had to rewrite", "Pin the approach in a prompt / skill"],
                        ["Environment failure", "Install / auth / env-var failure burned retries", "Repo Setup / blueprint fix"],
                        ["Scope creep", "Task too broad; tried to do too much", "Split into smaller / parallel sessions"],
                        ["Stalled review", "PR opened but never merged", "Smaller PRs + clear success criteria up front"]
                    ],
                    after: "<strong>Apply one fix now</strong>, usually the knowledge note or playbook from Phase 1, a prompt rewrite, or a repo-setup change. If time allows, re-run the task with the fix and compare time and tokens before vs. after."
                },
                b: {
                    title: "Run a before / after",
                    desc: "No session worth dissecting? Prove the value yourself in about 10 minutes. Pick any small, well-scoped task in a repo you know and run it twice.",
                    steps: ["<strong>Baseline:</strong> in a fresh session, give a thin prompt for the task with no extra context. Watch Devin guess at your conventions and investigate from scratch.", "<strong>Optimized:</strong> run the <em>same</em> task in a new session now that your Phase 1 knowledge note exists (Devin retrieves it automatically) and, if it fits, with your Phase 1 playbook attached.", "<strong>Compare</strong> the two with <strong>Generate session insights</strong> on each. The gap in time, tokens, and back-and-forth is exactly what your artifacts are worth."]
                }
            },
            extra: [
                { k: "Validate", v: "Make sure you can name the root cause in one sentence and point to the single artifact you created (knowledge note, playbook, prompt rewrite, or repo-setup change) to prevent that whole category of waste." }
            ]
                }
            ]
        },
        {
            id: 2,
            eyebrow: "Phase 3",
            title: "Secrets",
            sections: [
                {
                    narrative: "<span class='label'>Picture this</span><p>Some things Devin needs should never be typed into a prompt or committed to a repo: API keys, tokens, connection strings. That's what <em>secrets</em> are for. You store a value once, securely, and Devin uses it at runtime without it ever leaking into chat, code, or logs.</p><p>To make it concrete, you'll wire up the kanban app's <em>Run with Devin</em> feature. It happens to need a Devin API key, so the key is just the secret in this exercise. The real skill is providing it (and the rest of the config) as <strong>personal secrets</strong> instead of pasting it anywhere.</p>",
                    goal: "<strong>Goal:</strong> provide the credentials a real integration needs as <strong>personal secrets</strong>, then watch them power the app locally, here the kanban <strong>Run with Devin</strong> feature.",
                    steps: ["In a Devin session on the <code>kanban-todolist</code> repo, paste the prompt below. It carries the full setup instructions, so Devin copies the finished <em>Run with Devin</em> integration from <code>.finished/</code> into <code>start/</code> and you don't rebuild it from scratch.", "When Devin asks, hand over the required values as <strong>personal secrets</strong>, never pasted into chat or committed: <code>DEVIN_API_KEY</code> (grab it from <strong>Settings → Workshop-6-30 org → API Keys</strong>), plus <code>DEVIN_ORG_ID</code> and <code>DEVIN_USER_EMAIL</code>.", "Let Devin run <code>npm start</code> and open <code>http://localhost:3000</code>. Add a task, click <strong>Run with Devin</strong>, and watch the secrets you stored power a real session."],
                    prompt: "Set up the kanban Daily Task Tracker's 'Run with Devin' integration locally so I can see personal secrets in action. Follow these steps exactly.\n\nDo all of this on a branch off <workshop/201-your-github-username> (create that branch from main first if it does not exist) and open your PR into that branch, never into main.\n\n1) Use the finished files, do not rebuild. The complete, working integration already exists in .finished/. Copy it into start/:\n   - .finished/server.js to start/server.js\n   - .finished/js/devin.js to start/js/devin.js\n   - .finished/.env.example to start/.env.example\n   - Copy any other files start/ is missing so the board renders with the Devin controls (index.html, css/, the rest of js/). When in doubt, prefer the .finished/ version. start/package.json already runs node server.js on npm start.\n\n2) Secrets: personal, never in code. The server needs three values. Prompt me to provide each one as a personal secret (never paste them into chat or commit them):\n   - DEVIN_API_KEY from Settings \u2192 Workshop-6-30 org \u2192 API Keys (starts with cog_)\n   - DEVIN_ORG_ID, the org id (starts with org-)\n   - DEVIN_USER_EMAIL, the workshop account email\n   Write them into a git-ignored start/.env and never commit it. PORT is optional and defaults to 3000.\n\n3) Run and verify. From start/, run npm start (Node 18+) and open http://localhost:3000. The Run with Devin controls only appear once all three secrets are set. Add a task, click Run with Devin, and confirm a real session is created (the task auto-moves to Done when the session completes).",
                    extra: [
                        { k: "Validate", v: "The app at <code>localhost:3000</code> should show the <strong>Run with Devin</strong> control, which only appears once all three secrets are set. If it stays hidden, a secret is missing or misnamed, which is the whole point: the integration runs on the secrets, not on anything pasted into code." }
                    ]
                }
            ]
        }
    ];

    var STORAGE_KEY = "devin-201-workshop-v2";
    var current = 0;

    function loadState() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { done: {}, current: 0, opt: {} }; }
        catch (e) { return { done: {}, current: 0, opt: {} }; }
    }
    function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

    function showToast(msg) {
        var el = document.getElementById("toast");
        el.textContent = msg; el.classList.add("show");
        clearTimeout(showToast._t);
        showToast._t = setTimeout(function () { el.classList.remove("show"); }, 2000);
    }
    function countDone() { var s = loadState(), n = 0; PHASES.forEach(function (p) { if (s.done[p.id]) n++; }); return n; }

    function renderStepper() {
        var s = loadState();
        var wrap = document.getElementById("stepper");
        wrap.innerHTML = "";
        PHASES.forEach(function (p, i) {
            var step = document.createElement("div"); step.className = "step";
            var dot = document.createElement("div");
            var done = !!s.done[p.id];
            dot.className = "step-dot" + (done ? " done" : "") + (i === current ? " current" : "");
            dot.innerHTML = done ? "\u2713" : (i + 1);
            dot.title = p.title;
            dot.addEventListener("click", function () { goTo(i); });
            step.appendChild(dot);
            if (i < PHASES.length - 1) {
                var line = document.createElement("div");
                line.className = "step-line" + (done ? " done" : "");
                step.appendChild(line);
            }
            wrap.appendChild(step);
        });
    }

    function updateProgress() {
        var done = countDone();
        var pct = Math.round((done / PHASES.length) * 100);
        document.getElementById("progress-text").textContent = done + " / " + PHASES.length + " complete";
        document.getElementById("progress-pct").textContent = pct + "%";
        document.getElementById("progress-fill").style.width = pct + "%";
    }

    function esc(t) { return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

    function promptHTML(text) {
        // highlight <placeholders> in cyan
        return esc(text).replace(/&lt;[^&]*?&gt;/g, function (m) { return "<span class='hl'>" + m + "</span>"; })
                        .replace(/\[[^\]]*?\]/g, function (m) { return "<span class='hl'>" + m + "</span>"; });
    }

    function blockHTML(opt) {
        var html = "";
        if (opt.steps) {
            html += "<ol class='steps'>";
            opt.steps.forEach(function (st) { html += "<li>" + st + "</li>"; });
            html += "</ol>";
        }
        if (opt.table) {
            html += "<div class='extra' style='border-top:none;padding-top:0;margin-top:0'>";
            opt.table.forEach(function (row) {
                html += "<div class='row'><span class='k'>" + esc(row[0]) + "</span><span class='v'>" + row[1] + " &rarr; <strong>" + row[2] + "</strong></span></div>";
            });
            html += "</div>";
        }
        if (opt.prompt) {
            var pw = "<div class='prompt-wrap'><div class='prompt' data-raw=\"" + esc(opt.prompt).replace(/\"/g, "&quot;") + "\">" + promptHTML(opt.prompt) + "</div>";
            pw += "<div class='clearfix'><button class='copy-btn' data-copy='1'>Copy prompt</button></div></div>";
            if (opt.promptOptional) {
                html += "<details class='prompt-opt'><summary>Optional: a prompt to guide Devin</summary>" + pw + "</details>";
            } else {
                html += "<div style='margin-top:16px'><div class='prompt-label'>Copy this prompt into Devin</div>" + pw + "</div>";
            }
        }
        if (opt.after) { html += "<p class='opt-desc' style='margin-top:16px;margin-bottom:0'>" + opt.after + "</p>"; }
        return html;
    }

    function optionPaneHTML(opt, letter) {
        var html = "<div class='opt-title " + letter + "'><span class='pill'>Option " + letter.toUpperCase() + "</span>" + opt.title + "</div>";
        html += "<p class='opt-desc'>" + opt.desc + "</p>";
        return html + blockHTML(opt);
    }

    function sectionHTML(sec, secIdx, phaseId, s) {
        var html = "";
        if (sec.heading) html += "<div class='sec-head'>" + sec.heading + "</div>";
        if (sec.narrative) html += "<div class='narrative'>" + sec.narrative + "</div>";
        if (sec.goal) html += "<div class='goal'>" + sec.goal + "</div>";

        if (sec.options) {
            var key = phaseId + "-" + secIdx;
            var sel = (s.opt && s.opt[key]) === "b" ? "b" : "a";
            html += "<div class='opt-toggle' role='tablist'>";
            html += "<button class='opt-btn" + (sel === "a" ? " active" : "") + "' data-sec='" + secIdx + "' data-opt='a'><span class='tag'>A</span>" + sec.options.a.title + "</button>";
            html += "<button class='opt-btn" + (sel === "b" ? " active" : "") + "' data-sec='" + secIdx + "' data-opt='b'><span class='tag'>B</span>" + sec.options.b.title + "</button>";
            html += "</div>";
            html += "<div class='opt-pane" + (sel === "a" ? " active" : "") + "' data-sec='" + secIdx + "' data-pane='a'>" + optionPaneHTML(sec.options.a, "a") + "</div>";
            html += "<div class='opt-pane" + (sel === "b" ? " active" : "") + "' data-sec='" + secIdx + "' data-pane='b'>" + optionPaneHTML(sec.options.b, "b") + "</div>";
        } else {
            html += blockHTML(sec);
        }

        if (sec.extra) {
            html += "<div class='extra'>";
            sec.extra.forEach(function (e) {
                html += "<div class='row" + (e.check ? " check" : "") + "'><span class='k'>" + e.k + "</span><span class='v'>" + e.v + "</span></div>";
            });
            html += "</div>";
        }
        return html;
    }

    function renderStage() {
        var p = PHASES[current];
        var s = loadState();
        document.getElementById("stage-eyebrow").textContent = p.eyebrow;
        document.getElementById("stage-title").textContent = p.title;

        var body = document.getElementById("stage-body");
        var html = "";
        p.sections.forEach(function (sec, i) {
            html += "<div class='section'>" + sectionHTML(sec, i, p.id, s) + "</div>";
        });

        body.innerHTML = html;
        wireBody();

        document.getElementById("complete-check").checked = !!s.done[p.id];
        document.getElementById("prev-btn").disabled = false;
        var nb = document.getElementById("next-btn");
        nb.disabled = false;
        nb.innerHTML = (current === PHASES.length - 1) ? "Finish &#10003;" : "Next &rarr;";
        renderStepper();
    }

    function wireBody() {
        // option toggle
        document.querySelectorAll(".opt-btn").forEach(function (btn) {
            btn.addEventListener("click", function () {
                var opt = this.getAttribute("data-opt");
                var secIdx = this.getAttribute("data-sec");
                var s = loadState(); s.opt = s.opt || {}; s.opt[PHASES[current].id + "-" + secIdx] = opt; saveState(s);
                document.querySelectorAll(".opt-btn[data-sec='" + secIdx + "']").forEach(function (b) { b.classList.toggle("active", b.getAttribute("data-opt") === opt); });
                document.querySelectorAll(".opt-pane[data-sec='" + secIdx + "']").forEach(function (pane) { pane.classList.toggle("active", pane.getAttribute("data-pane") === opt); });
            });
        });
        // copy buttons
        document.querySelectorAll("[data-copy]").forEach(function (btn) {
            btn.addEventListener("click", function () {
                var raw = this.closest(".prompt-wrap").querySelector(".prompt").getAttribute("data-raw");
                var self = this;
                navigator.clipboard.writeText(raw).then(function () {
                    self.textContent = "Copied!"; self.classList.add("copied");
                    showToast("Prompt copied to clipboard");
                    setTimeout(function () { self.textContent = "Copy prompt"; self.classList.remove("copied"); }, 1500);
                });
            });
        });
    }

    function setPhase(i) {
        if (i < 0 || i >= PHASES.length) return;
        current = i;
        var s = loadState(); s.current = current;
        for (var j = 0; j < current; j++) { s.done[PHASES[j].id] = true; }
        saveState(s);
        renderStage(); updateProgress();
        window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function goTo(i) { setPhase(i); }

    document.getElementById("prev-btn").addEventListener("click", function () {
        if (current === 0) { backToIntro(); } else { setPhase(current - 1); }
    });
    document.getElementById("next-btn").addEventListener("click", function () {
        var s = loadState(); s.done[PHASES[current].id] = true; saveState(s);
        document.getElementById("complete-check").checked = true;
        updateProgress(); renderStepper();
        if (current === PHASES.length - 1) { showFinished(); }
        else { showGate(current + 1); }
    });
    document.getElementById("complete-check").addEventListener("change", function () {
        var s = loadState();
        s.done[PHASES[current].id] = this.checked; saveState(s);
        updateProgress(); renderStepper();
        if (this.checked) showToast(PHASES[current].title + " complete");
    });

    function resetAll() {
        localStorage.removeItem(STORAGE_KEY);
        current = 0; renderStage(); updateProgress(); showView("intro");
        showToast("Progress reset");
    }

    function showView(name) {
        document.getElementById("intro").style.display = name === "intro" ? "block" : "none";
        document.getElementById("workshop").style.display = name === "workshop" ? "block" : "none";
        document.getElementById("gate").style.display = name === "gate" ? "block" : "none";
        document.getElementById("finished").style.display = name === "finished" ? "block" : "none";
    }
    function beginWorkshop() {
        var s = loadState(); s.started = true; saveState(s);
        showView("workshop"); setPhase(0);
    }
    function backToIntro() {
        var s = loadState(); s.started = false; saveState(s);
        showView("intro"); window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function showGate(nextIndex) {
        document.getElementById("gate-body").innerHTML =
            "<div class='narrative'><span class='label'>Pause</span><p>Nice, that stage is done. <strong>Wait here</strong> until we move on to the next stage as a group. We'll come around if anyone is stuck.</p></div>" +
            "<div class='start-wrap'><button class='nav-btn primary start-btn' id='gate-continue'>Continue when we move on &rarr;</button></div>";
        document.getElementById("gate-continue").addEventListener("click", function () {
            showView("workshop"); setPhase(nextIndex);
        });
        showView("gate"); window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function showFinished() {
        document.getElementById("finished-body").innerHTML =
            "<div class='narrative'><span class='label'>That's a wrap</span><p>You walked in using Devin and you're walking out having <em>tuned</em> it: knowledge that stops the guessing, a playbook that automates a repeat, and a fix that kills a recurring source of waste.</p></div>" +
            "<div class='goal'><p>Congrats!</p></div>" +
            "<div class='start-wrap'><button class='nav-btn primary start-btn' id='finished-restart'>Back to the start</button></div>";
        document.getElementById("finished-restart").addEventListener("click", backToIntro);
        showView("finished"); window.scrollTo({ top: 0, behavior: "smooth" });
    }

    (function init() {
        document.getElementById("intro-body").innerHTML =
            "<div class='goal'>" + FRAMING.goal + "</div>" +
            "<div class='start-wrap'><button class='nav-btn primary start-btn' id='start-btn'>Start the workshop &rarr;</button></div>";
        document.getElementById("start-btn").addEventListener("click", beginWorkshop);

        var s = loadState();
        current = (typeof s.current === "number" && s.current >= 0 && s.current < PHASES.length) ? s.current : 0;
        for (var j = 0; j < current; j++) { s.done[PHASES[j].id] = true; }
        saveState(s);
        renderStage(); updateProgress();
        showView(s.started ? "workshop" : "intro");
    })();
    </script>
</body>
</html>
